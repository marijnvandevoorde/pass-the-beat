name: Dependabot auto-merge

# Merges Dependabot PRs for minor and patch version updates as soon as they
# are opened. Major updates are skipped here so they can be reviewed manually.
#
# Uses a direct merge (not `gh pr merge --auto`): the auto-merge queue is not
# available on private repos without a paid plan. A direct merge happens
# immediately, so if you later add required status checks, revisit this
# workflow to wait for them before merging.
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot-auto-merge:
    runs-on: ubuntu-latest
    # Only act on PRs opened by Dependabot.
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Merge minor and patch updates
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-minor' ||
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
