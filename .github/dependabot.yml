# Dependabot configuration.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Dependabot opens PRs automatically on the schedule below.
# Minor + patch updates are grouped into a single PR and are auto-merged by
# .github/workflows/dependabot-auto-merge.yml once checks pass.
# Major updates get their own PR for manual review and are not auto-merged.
version: 2
updates:
  # Python dependencies (requirements.txt at the repo root).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      pip-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
